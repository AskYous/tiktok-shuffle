<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TikTok Shuffle Player</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; }
  header {
    width: 100%; padding: 8px 12px; display: flex; gap: 8px; align-items: center;
    background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10;
  }
  header button {
    flex: 0 0 auto; padding: 8px 12px; background: #fe2c55; color: #fff;
    border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  header .meta { font-size: 12px; opacity: 0.75; margin-left: auto; }
  #stage { flex: 1; width: 100%; display: flex; justify-content: center; padding: 8px; }
  iframe { width: 325px; max-width: 100%; height: 740px; max-height: 85vh; border: 0; border-radius: 8px; background: #000; }
  .empty { padding: 32px; text-align: center; max-width: 480px; }
  .empty code { background: #222; padding: 2px 6px; border-radius: 4px; word-break: break-all; }
  input[type="text"] {
    width: 100%; padding: 10px; margin-top: 12px;
    background: #111; color: #fff; border: 1px solid #333; border-radius: 6px;
  }
</style>
</head>
<body>
<header id="bar" hidden>
  <button id="prev">◀ Prev</button>
  <button id="next">Next ▶</button>
  <button id="reshuffle">⇄ Reshuffle</button>
  <button id="loadnew">＋ Load</button>
  <label style="font-size:12px;display:flex;gap:4px;align-items:center;">
    <input type="checkbox" id="auto" /> auto
  </label>
  <label style="font-size:12px;display:flex;gap:4px;align-items:center;">
    <input type="number" id="dur" value="30" min="5" max="300" style="width:48px;background:#111;color:#fff;border:1px solid #333;border-radius:4px;padding:2px;" />s
  </label>
  <span class="meta"><span id="pos">0</span>/<span id="total">0</span></span>
</header>
<main id="stage">
  <div class="empty" id="empty">
    <h2>TikTok Shuffle Player</h2>
    <p>No videos loaded. Append a comma-separated list of TikTok video IDs to the URL hash:</p>
    <p><code>player.html#1234,5678,9012</code></p>
    <p>Or paste a full shuffle URL here:</p>
    <input id="paste" type="text" placeholder="paste URL with #ids here" />
  </div>
</main>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const stage = $('stage'), bar = $('bar'), empty = $('empty');
  let order = [], pos = 0;

  function shuffle(a) {
    const arr = a.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function parseHash(h) {
    if (!h) return [];
    const raw = h.replace(/^#/, '');
    return raw.split(',').map((s) => s.trim()).filter((s) => /^\d+$/.test(s));
  }

  let timer = null;
  function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }
  function scheduleAdvance() {
    clearTimer();
    if (!$('auto').checked) return;
    const secs = Math.max(5, parseInt($('dur').value, 10) || 30);
    timer = setTimeout(() => $('next').click(), secs * 1000);
  }

  function render() {
    clearTimer();
    if (!order.length) { empty.hidden = false; bar.hidden = true; return; }
    empty.hidden = true; bar.hidden = false;
    $('total').textContent = order.length;
    $('pos').textContent = pos + 1;
    const id = order[pos];
    stage.querySelectorAll('iframe').forEach((n) => n.remove());
    const f = document.createElement('iframe');
    f.src = `https://www.tiktok.com/embed/v2/${id}?autoplay=1&loop=0`;
    f.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
    f.allowFullscreen = true;
    stage.appendChild(f);
    scheduleAdvance();
  }

  window.addEventListener('message', (e) => {
    if (!/tiktok\.com$/.test(new URL(e.origin).hostname)) return;
    const d = e.data;
    const t = (d && (d.type || d.eventName || d.event)) || '';
    if (/end|ended|finish|complete/i.test(String(t))) {
      if ($('auto').checked) $('next').click();
    }
  });

  $('auto').addEventListener('change', scheduleAdvance);
  $('dur').addEventListener('change', scheduleAdvance);

  function load(ids) {
    order = shuffle(ids);
    pos = 0;
    render();
  }

  $('next').onclick = () => { if (!order.length) return; pos = (pos + 1) % order.length; render(); };
  $('prev').onclick = () => { if (!order.length) return; pos = (pos - 1 + order.length) % order.length; render(); };
  $('reshuffle').onclick = () => { if (!order.length) return; load(order); };
  $('loadnew').onclick = () => {
    const v = prompt('Paste shuffle URL or comma-separated video IDs:');
    if (!v) return;
    const hash = v.includes('#') ? v.slice(v.indexOf('#')) : '#' + v;
    const ids = parseHash(hash);
    if (ids.length) { history.replaceState(null, '', hash); load(ids); }
    else alert('No valid video IDs found.');
  };

  $('paste').addEventListener('change', (e) => {
    const v = e.target.value;
    const hash = v.includes('#') ? v.slice(v.indexOf('#')) : '#' + v;
    const ids = parseHash(hash);
    if (ids.length) { history.replaceState(null, '', hash); load(ids); }
    else alert('No video IDs found in pasted text.');
  });

  window.addEventListener('hashchange', () => load(parseHash(location.hash)));

  const initial = parseHash(location.hash);
  if (initial.length) load(initial);
})();
</script>
</body>
</html>
